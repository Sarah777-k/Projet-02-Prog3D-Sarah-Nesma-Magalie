<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Labyrinthe Thesaurus - Magalie Abada, Sarah Khodjaoui, Nesma Medjber</title>
  </head>

  <body>
    <canvas id="monCanvas" width="1890" height="1000">
      Votre navigateur ne supporte pas la balise canvas
    </canvas>

    <!-- Filtre glitch -->
    <div id="filtreEcran" class="filtre-ecran"></div>
    
    <!-- Écran de transition -->
    <div id="ecranTransition" class="ecran-transition visible">
      <div class="ecran-contenu">
        <h1 id="titreTransition"></h1>
        <p id="sousTitreTransition"></p>
        <button id="boutonTransition"></button>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-rec">
        <div class="rec-dot"></div>
        <span class="rec-text">REC</span>
      </div>
      <div class="info-hud">
        <span class="label">NIVEAU</span>
        <span id="niveau" class="valeur"></span>
      </div>
      <div class="info-hud">
        <span class="label">SCORE</span>
        <span id="score" class="valeur"></span>
      </div>
      <div class="info-hud">
        <span class="label">TEMPS</span>
        <span id="temps" class="valeur"></span>
      </div>
      <div class="info-hud">
        <span class="label">OUVREURS</span>
        <span id="ouvreurs" class="valeur"></span>
      </div>
    </div>
    
    <!-- Code JavaScript -->
    <script src="../includes/glMatrix-0.9.5.min.js"></script>
    <script src="../includes/WebGL.js"></script>
    <script src="../includes/Camera.js"></script>
    <script src="../includes/Shaders.js"></script>
    <script src="../js/core/audioManager.js"></script>
    <script src="../js/core/UIManager.js"></script>

    <script src="../js/utils/UtilsAleatoire.js"></script>
    <script src="../js/utils/UtilsGeneral.js"></script>
    <script src="../js/core/timeManager.js"></script>
    <script src="../js/core/scoreManager.js"></script>
    <script src="../js/monde/cell.js"></script>
    <script src="../js/monde/maze.js"></script>
    <script src="../js/monde/levelManager.js"></script>
    <script src="../js/monde/placementObjets.js"></script>

    <!-- Graphique -->
     <script src="../js/entites/mur.js"></script>
    <script src="../js/graphique/MaterialFactory.js"></script>
    <script src="../js/graphique/MeshFactory.js"></script>

    <!-- Scène -->
    <script src="../js/entites/joueur.js"></script>
    <script src="../js/core/miniMapManager.js"></script>
    <script src="../js/core/inputManager.js"></script>
    <script src="../js/core/sceneManager.js"></script>
    <script src="../js/core/transitionManager.js"></script>
    
    <script src="../js/core/game.js"></script>

    <script src="../js/main.js"></script>
    
  </body>
</html>
